name: AMATIS Institutional CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff black pytest pytest-cov mypy

    - name: Ruff linting
      run: |
        ruff check src/amatix tests/

    - name: Black formatting check
      run: |
        black --check src/amatix tests/

    - name: Mypy static analysis
      run: |
        mypy src/amatix/ --ignore-missing-imports
      continue-on-error: true

    - name: Run unit tests
      run: |
        pytest tests/unit/ -v --cov=src/amatix --cov-report=xml

    - name: Run integration tests
      run: |
        pytest tests/integration/ -v

    - name: Run simulation tests
      run: |
        pytest tests/simulation/ -v

    - name: Run torture tests
      run: |
        pytest tests/torture/ -v
      continue-on-error: true

    - name: Run performance benchmarks
      run: |
        pytest tests/performance/ -v
      continue-on-error: true

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
